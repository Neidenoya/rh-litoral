<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RH Litoral | Gestão Estratégica de Pessoas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<style>
/* ============================================================
   DESIGN TOKENS — RH Litoral
   ============================================================ */
:root{
  --c-primary-900:#0F2A4A;
  --c-primary-800:#16385E;
  --c-primary-700:#1E4976;
  --c-primary-600:#2563EB;
  --c-primary-500:#3B82F6;
  --c-primary-100:#DBEAFE;
  --c-primary-50:#EFF5FF;

  --c-accent:#0D9488;
  --c-accent-100:#CCFBF1;

  --c-success:#16A34A;
  --c-success-bg:#DCFCE7;
  --c-warning:#D97706;
  --c-warning-bg:#FEF3C7;
  --c-danger:#DC2626;
  --c-danger-bg:#FEE2E2;
  --c-info:#0EA5E9;
  --c-info-bg:#E0F2FE;

  --bg-app:#F4F6F9;
  --bg-surface:#FFFFFF;
  --bg-surface-alt:#F8FAFC;
  --bg-sidebar:#0F2A4A;
  --border-subtle:#E2E8F0;
  --border-strong:#CBD5E1;

  --text-primary:#0F1B2D;
  --text-secondary:#5B6B82;
  --text-tertiary:#94A3B8;
  --text-on-dark:#E8EEF7;
  --text-on-dark-dim:#90A4C2;

  --shadow-sm:0 1px 2px rgba(15,27,45,0.06);
  --shadow-md:0 4px 14px rgba(15,27,45,0.08);
  --shadow-lg:0 12px 32px rgba(15,27,45,0.14);

  --radius-sm:8px;
  --radius-md:12px;
  --radius-lg:16px;

  --font-ui:'Inter',sans-serif;
  --font-display:'Manrope',sans-serif;

  --sidebar-w:248px;
  --sidebar-w-collapsed:76px;
}

html.dark{
  --bg-app:#0B1626;
  --bg-surface:#11203A;
  --bg-surface-alt:#0E1B30;
  --bg-sidebar:#081222;
  --border-subtle:#1E3354;
  --border-strong:#2A476F;

  --text-primary:#EAF0FA;
  --text-secondary:#9BB0CC;
  --text-tertiary:#6B82A3;

  --c-primary-50:#102A4A;
  --c-primary-100:#16385E;

  --success-bg:#0F3322;
  --warning-bg:#3A2A0B;
  --danger-bg:#3A1212;
  --c-success-bg:#103321;
  --c-warning-bg:#3A2B0C;
  --c-danger-bg:#3B1418;
  --c-info-bg:#0D2B3D;

  --shadow-sm:0 1px 2px rgba(0,0,0,0.3);
  --shadow-md:0 4px 14px rgba(0,0,0,0.35);
  --shadow-lg:0 16px 40px rgba(0,0,0,0.5);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-ui);
  background:var(--bg-app);
  color:var(--text-primary);
  -webkit-font-smoothing:antialiased;
  transition:background .25s ease, color .25s ease;
}
#root{min-height:100vh;}
button{font-family:inherit;}
::selection{background:var(--c-primary-100);}

/* Scrollbar */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:8px;}

/* ============== APP SHELL ============== */
.app-shell{display:flex;min-height:100vh;}

/* ---- SIDEBAR ---- */
.sidebar{
  width:var(--sidebar-w);
  background:var(--bg-sidebar);
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  transition:width .2s ease;
  position:relative;
  z-index:20;
}
.sidebar.collapsed{width:var(--sidebar-w-collapsed);}
.sidebar-brand{
  display:flex;align-items:center;gap:10px;
  padding:22px 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  white-space:nowrap;
  overflow:hidden;
}
.sidebar-brand-mark{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--c-primary-600),var(--c-accent));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:800;color:white;font-size:15px;
}
.sidebar-brand-text{font-family:var(--font-display);font-weight:800;font-size:16.5px;color:#fff;letter-spacing:.2px;}
.sidebar-brand-sub{font-size:10.5px;color:var(--text-on-dark-dim);letter-spacing:.6px;text-transform:uppercase;margin-top:1px;}

.sidebar-nav{flex:1;overflow-y:auto;padding:14px 12px;}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;margin-bottom:2px;
  border-radius:9px;
  color:var(--text-on-dark-dim);
  font-size:13.5px;font-weight:500;
  cursor:pointer;white-space:nowrap;overflow:hidden;
  transition:background .15s, color .15s;
  position:relative;
}
.nav-item svg{flex-shrink:0;width:18px;height:18px;}
.nav-item:hover{background:rgba(255,255,255,0.06);color:#fff;}
.nav-item.active{background:linear-gradient(135deg,var(--c-primary-600),#2D7BF0);color:#fff;box-shadow:var(--shadow-sm);}
.nav-item-label{overflow:hidden;text-overflow:ellipsis;}
.sidebar.collapsed .nav-item-label,
.sidebar.collapsed .sidebar-brand-text,
.sidebar.collapsed .sidebar-brand-sub{display:none;}
.sidebar.collapsed .nav-item{justify-content:center;}
.sidebar.collapsed .sidebar-brand{justify-content:center;}

.sidebar-collapse-btn{
  margin:10px 14px 16px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:9px;border-radius:8px;
  background:rgba(255,255,255,0.05);
  color:var(--text-on-dark-dim);
  font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,0.07);
}
.sidebar-collapse-btn:hover{background:rgba(255,255,255,0.09);color:#fff;}

/* ---- MAIN AREA ---- */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;}

/* ---- TOPBAR ---- */
.topbar{
  height:68px;flex-shrink:0;
  background:var(--bg-surface);
  border-bottom:1px solid var(--border-subtle);
  display:flex;align-items:center;
  padding:0 28px;gap:20px;
  position:sticky;top:0;z-index:10;
}
.topbar-title{font-family:var(--font-display);font-weight:800;font-size:19px;color:var(--text-primary);white-space:nowrap;}
.topbar-search{
  flex:1;max-width:420px;
  display:flex;align-items:center;gap:9px;
  background:var(--bg-surface-alt);
  border:1px solid var(--border-subtle);
  border-radius:10px;padding:9px 14px;
  color:var(--text-tertiary);
  transition:border-color .15s;
}
.topbar-search:focus-within{border-color:var(--c-primary-500);}
.topbar-search input{
  border:none;outline:none;background:transparent;
  font-size:13.5px;color:var(--text-primary);width:100%;font-family:inherit;
}
.topbar-search svg{flex-shrink:0;width:16px;height:16px;}
.topbar-spacer{flex:1;}
.topbar-actions{display:flex;align-items:center;gap:14px;}

.icon-btn{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-surface-alt);border:1px solid var(--border-subtle);
  color:var(--text-secondary);cursor:pointer;position:relative;
  transition:background .15s,color .15s;
}
.icon-btn:hover{background:var(--c-primary-50);color:var(--c-primary-600);}
.icon-btn svg{width:17px;height:17px;}
.icon-btn .dot{
  position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;
  background:var(--c-danger);border:1.5px solid var(--bg-surface);
}

.topbar-user{display:flex;align-items:center;gap:10px;padding-left:10px;border-left:1px solid var(--border-subtle);cursor:pointer;}
.topbar-user-name{font-size:13px;font-weight:600;color:var(--text-primary);line-height:1.2;}
.topbar-user-role{font-size:11px;color:var(--text-tertiary);}

.avatar{
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;color:#fff;flex-shrink:0;
}

/* ---- CONTENT ---- */
.content{flex:1;padding:26px 28px 40px;overflow-x:hidden;}
.content-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
.content-eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--c-primary-600);margin-bottom:4px;}
.content-h1{font-family:var(--font-display);font-weight:800;font-size:26px;color:var(--text-primary);letter-spacing:-.2px;}
.content-sub{font-size:13.5px;color:var(--text-secondary);margin-top:4px;}

.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;
  cursor:pointer;border:1px solid transparent;font-family:inherit;
  transition:transform .1s, box-shadow .15s, background .15s;
}
.btn:active{transform:scale(0.98);}
.btn svg{width:15px;height:15px;}
.btn-primary{background:linear-gradient(135deg,var(--c-primary-600),#2D7BF0);color:#fff;box-shadow:var(--shadow-sm);}
.btn-primary:hover{box-shadow:var(--shadow-md);}
.btn-ghost{background:var(--bg-surface);color:var(--text-secondary);border-color:var(--border-subtle);}
.btn-ghost:hover{background:var(--bg-surface-alt);color:var(--text-primary);}

/* ---- KPI GRID ---- */
.kpi-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(218px,1fr));
  gap:16px;margin-bottom:26px;
}
.kpi-card{
  background:var(--bg-surface);border:1px solid var(--border-subtle);
  border-radius:var(--radius-md);padding:18px 18px 16px;
  box-shadow:var(--shadow-sm);
  display:flex;flex-direction:column;gap:10px;
  position:relative;overflow:hidden;
  transition:box-shadow .2s, transform .2s;
}
.kpi-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.kpi-card-top{display:flex;align-items:center;justify-content:space-between;}
.kpi-icon{
  width:34px;height:34px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.kpi-icon svg{width:17px;height:17px;}
.kpi-label{font-size:12px;color:var(--text-secondary);font-weight:600;}
.kpi-value{font-family:var(--font-display);font-weight:800;font-size:25px;color:var(--text-primary);letter-spacing:-.3px;}
.kpi-value .unit{font-size:14px;font-weight:600;color:var(--text-tertiary);margin-left:3px;}
.kpi-delta{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:2px 7px;border-radius:6px;width:fit-content;}
.kpi-delta.up{color:var(--c-success);background:var(--c-success-bg);}
.kpi-delta.down{color:var(--c-danger);background:var(--c-danger-bg);}
.kpi-delta.neutral{color:var(--text-tertiary);background:var(--bg-surface-alt);}

/* ---- PANELS / CARDS ---- */
.panel{
  background:var(--bg-surface);border:1px solid var(--border-subtle);
  border-radius:var(--radius-lg);padding:22px;box-shadow:var(--shadow-sm);
}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.panel-title{font-family:var(--font-display);font-weight:700;font-size:15.5px;color:var(--text-primary);}
.panel-sub{font-size:12px;color:var(--text-tertiary);margin-top:2px;}
.panel-link{font-size:12.5px;font-weight:600;color:var(--c-primary-600);cursor:pointer;}

.grid-2col{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin-bottom:18px;align-items:start;}
.grid-3col{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:18px;}
@media (max-width:1100px){.grid-2col,.grid-3col{grid-template-columns:1fr;}}

/* ---- LISTS ---- */
.list-row{
  display:flex;align-items:center;gap:12px;padding:10px 4px;
  border-bottom:1px solid var(--border-subtle);
}
.list-row:last-child{border-bottom:none;}
.list-row-main{flex:1;min-width:0;}
.list-row-title{font-size:13px;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.list-row-meta{font-size:11.5px;color:var(--text-tertiary);margin-top:1px;}

.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700;white-space:nowrap;
}
.badge-success{background:var(--c-success-bg);color:var(--c-success);}
.badge-warning{background:var(--c-warning-bg);color:var(--c-warning);}
.badge-danger{background:var(--c-danger-bg);color:var(--c-danger);}
.badge-info{background:var(--c-info-bg);color:var(--c-info);}
.badge-neutral{background:var(--bg-surface-alt);color:var(--text-secondary);border:1px solid var(--border-subtle);}

.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
.bar-label{font-size:12px;color:var(--text-secondary);width:130px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;height:8px;background:var(--bg-surface-alt);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--c-primary-600),var(--c-primary-500));}
.bar-value{font-size:12px;font-weight:700;color:var(--text-primary);width:38px;text-align:right;flex-shrink:0;}

/* ---- TABLE ---- */
.table-wrap{overflow-x:auto;}
table.data-table{width:100%;border-collapse:collapse;font-size:13px;}
.data-table th{
  text-align:left;padding:10px 12px;font-size:11px;font-weight:700;
  color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.4px;
  border-bottom:1px solid var(--border-subtle);white-space:nowrap;
}
.data-table td{padding:11px 12px;border-bottom:1px solid var(--border-subtle);color:var(--text-primary);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tbody tr{cursor:pointer;transition:background .12s;}
.data-table tbody tr:hover{background:var(--bg-surface-alt);}
.row-person{display:flex;align-items:center;gap:10px;}
.row-person-name{font-weight:600;font-size:13px;color:var(--text-primary);}
.row-person-sub{font-size:11.5px;color:var(--text-tertiary);}

/* ---- FILTER BAR ---- */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
.filter-select{
  padding:8px 12px;border-radius:8px;border:1px solid var(--border-subtle);
  background:var(--bg-surface);color:var(--text-secondary);font-size:12.5px;font-weight:500;
  cursor:pointer;font-family:inherit;
}
.filter-chip{
  display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;
  background:var(--c-primary-50);color:var(--c-primary-700);font-size:12px;font-weight:600;
  border:1px solid var(--c-primary-100);cursor:pointer;
}

/* ============== ORGANOGRAMA ============== */
.org-wrap{
  overflow:auto;padding:30px 10px 10px;
  background:
    radial-gradient(circle at 1px 1px, var(--border-subtle) 1px, transparent 0);
  background-size:22px 22px;
  border-radius:var(--radius-lg);
  min-height:560px;
}
.org-tree{display:flex;justify-content:center;}
.org-node{display:flex;flex-direction:column;align-items:center;}
.org-card{
  background:var(--bg-surface);border:1.5px solid var(--border-subtle);
  border-radius:12px;padding:12px 16px;min-width:188px;
  display:flex;align-items:center;gap:10px;
  box-shadow:var(--shadow-sm);cursor:pointer;
  transition:box-shadow .15s, border-color .15s, transform .15s;
  position:relative;z-index:2;
}
.org-card:hover{box-shadow:var(--shadow-md);border-color:var(--c-primary-500);transform:translateY(-2px);}
.org-card.root{border-color:var(--c-primary-600);background:linear-gradient(135deg,var(--c-primary-50),var(--bg-surface));}
.org-card-info{min-width:0;}
.org-card-name{font-size:12.5px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;}
.org-card-role{font-size:11px;color:var(--text-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;}
.org-card-count{
  position:absolute;top:-8px;right:-8px;
  background:var(--c-accent);color:#fff;font-size:10px;font-weight:700;
  width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-sm);
}
.org-children{display:flex;gap:28px;position:relative;padding-top:28px;margin-top:0;}
.org-children::before{
  content:'';position:absolute;top:0;left:50%;width:1.5px;height:28px;background:var(--border-strong);
}
.org-node-wrap{position:relative;padding-top:0;}
.org-node-wrap::before{
  content:'';position:absolute;top:-28px;left:50%;width:1.5px;height:28px;background:var(--border-strong);
}
.org-hline{position:absolute;top:0;height:1.5px;background:var(--border-strong);}
.org-toggle{
  width:18px;height:18px;border-radius:50%;background:var(--bg-surface);border:1.5px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--text-secondary);
  font-size:11px;font-weight:700;
}

/* ============== FICHA COLABORADOR (DRAWER) ============== */
.drawer-overlay{
  position:fixed;inset:0;background:rgba(8,16,28,0.45);backdrop-filter:blur(2px);
  z-index:50;display:flex;justify-content:flex-end;
  animation:fadeIn .15s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.drawer{
  width:480px;max-width:92vw;height:100%;background:var(--bg-surface);
  box-shadow:var(--shadow-lg);overflow-y:auto;
  animation:slideIn .22s cubic-bezier(.16,1,.3,1);
}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.drawer-head{
  background:linear-gradient(135deg,var(--c-primary-800),var(--c-primary-900));
  padding:26px 26px 60px;position:relative;color:#fff;
}
.drawer-close{
  position:absolute;top:18px;right:18px;width:32px;height:32px;border-radius:8px;
  background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;
}
.drawer-close:hover{background:rgba(255,255,255,0.2);}
.drawer-avatar-row{display:flex;align-items:center;gap:16px;}
.drawer-avatar{width:64px;height:64px;border-radius:16px;font-size:22px;box-shadow:var(--shadow-md);border:2.5px solid rgba(255,255,255,0.5);}
.drawer-name{font-family:var(--font-display);font-weight:800;font-size:19px;}
.drawer-role{font-size:13px;color:var(--text-on-dark-dim);margin-top:2px;}
.drawer-tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.drawer-tag{background:rgba(255,255,255,0.14);padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;}

.drawer-body{padding:0 26px 30px;margin-top:-36px;}
.drawer-section{
  background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:14px;
  padding:18px;margin-bottom:14px;box-shadow:var(--shadow-sm);
}
.drawer-section-title{
  font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  color:var(--c-primary-600);margin-bottom:12px;display:flex;align-items:center;gap:6px;
}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.field{min-width:0;}
.field-label{font-size:10.5px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;}
.field-value{font-size:13px;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;}
.field.full{grid-column:1/-1;}

.doc-chip{
  display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:9px;
  background:var(--bg-surface-alt);border:1px solid var(--border-subtle);margin-bottom:7px;font-size:12.5px;font-weight:600;
}
.doc-chip svg{width:15px;height:15px;color:var(--c-primary-600);flex-shrink:0;}

/* ---- TOOLTIP RECHARTS override ---- */
.recharts-default-tooltip{
  background:var(--bg-surface) !important;border:1px solid var(--border-subtle) !important;
  border-radius:10px !important;box-shadow:var(--shadow-md) !important;font-family:var(--font-ui) !important;font-size:12px !important;
}

/* ---- responsive ---- */
@media (max-width:880px){
  .sidebar{position:fixed;left:0;top:0;height:100%;transform:translateX(-100%);}
  .sidebar.mobile-open{transform:translateX(0);}
  .topbar-title{display:none;}
}

.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:50px 20px;color:var(--text-tertiary);text-align:center;
}
.empty-state svg{width:42px;height:42px;margin-bottom:12px;opacity:.5;}
.empty-state-title{font-size:14px;font-weight:600;color:var(--text-secondary);margin-bottom:4px;}
.empty-state-sub{font-size:12.5px;}

.placeholder-panel{
