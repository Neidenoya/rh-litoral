# Blueprint do Render — RH Litoral
# 1 Web Service (NestJS servindo a API /api/v1 + o frontend estático).
# O PostgreSQL NÃO é criado aqui (o Free permite só 1 banco por conta, já usado por
# outro projeto). Use um Postgres externo dedicado (ex.: Neon) e defina DATABASE_URL
# manualmente nas Environment Variables do serviço. Ver DEPLOY.md.

services:
  - type: web
    name: rh-litoral
    runtime: node
    plan: free
    region: oregon
    buildCommand: >-
      npm install --prefix app/frontend &&
      npm run build --prefix app/frontend &&
      npm install --prefix app/backend &&
      npm run prisma:generate --prefix app/backend &&
      npm run build --prefix app/backend
    startCommand: >-
      npm run prisma:deploy --prefix app/backend &&
      node app/backend/dist/main.js
    healthCheckPath: /api/v1/health
    envVars:
      # Defina no painel do Render (Environment) com a URL do seu Postgres externo.
      # Inclua ?sslmode=require. Ex.: postgresql://user:pass@host/db?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: NODE_VERSION
        value: 20.18.0
